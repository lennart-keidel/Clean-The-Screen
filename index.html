<html>

<head>
  <title>Bildschirm putzen</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <style>
    body {
      font-family: sans-serif;
      font-size: 20px;
      transition: background 0.7s ease-in-out;
    }

    body.white {
      background-color: #fff;
    }

    body.black {
      background-color: #000;
    }

    .center_page {
      width: 100%;
      height: 1em;
      text-align: center;

      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      right: 0;

      margin: auto;
      transition: all 0.7s ease-in-out;
    }

    .white .center_page {
      color: #000;
    }

    .black .center_page {
      color: #fff;
    }

    body.not-visible {
      cursor: none;
    }

    .not-visible .center_page {
      opacity: 0;
    }

    .italic {
      font-style: italic;
    }

    .smaller {
      font-size: 80%;
    }
  </style>
</head>

<body class="white" id="toggle_background"
  style="-moz-user-select: none; -webkit-user-select: none; -ms-user-select:none; user-select:none;-o-user-select:none;"
  unselectable="on" onselectstart="return false;" onmousedown="return false;">

  <div class="center_page not-visible" id="toggle_text">
    Click = Hintergrund wechseln und Vollbild einstellen<br><br>
    <span class="smaller">ESC = Vollbild beenden</span>
  </div>

</body>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script>

  // toggle background-color-class on click
  $("body").on("click", function () {
    $("body").hasClass("white")
      ? $("body").removeClass("white") && $("body").addClass("black")
      : $("body").removeClass("black") && $("body").addClass("white");
  });

  // toggle not-visisble class on mousemove
  $("*").mousemove(function () {
    $("body").removeClass("not-visible");
    setTimeout(function () {
      $("body").addClass("not-visible");
    }, 5000);
  });


  $("*").click(function () {
    openFullscreen();
  });


  // variabel for fullscreen
  var is_fullscreen = false;

  /* View in fullscreen */
  function openFullscreen() {
    var element = document.documentElement;
    var promise;
    is_fullscreen = true;
    if (element.requestFullscreen) {
      promise = element.requestFullscreen();
    } else if (element.mozRequestFullScreen) { /* Firefox */
      promise = element.mozRequestFullScreen();
    } else if (element.webkitRequestFullscreen) { /* Chrome, Safari and Opera */
      promise = element.webkitRequestFullscreen();
    } else if (element.msRequestFullscreen) { /* IE/Edge */
      promise = element.msRequestFullscreen();
    }
  }

  /* Close fullscreen */
  function closeFullscreen() {
    var element = document.documentElement;
    var promise;
    is_fullscreen = false;
    if (document.exitFullscreen) {
      promise = document.exitFullscreen();
    } else if (document.mozCancelFullScreen) { /* Firefox */
      promise = document.mozCancelFullScreen();
    } else if (document.webkitExitFullscreen) { /* Chrome, Safari and Opera */
      promise = document.webkitExitFullscreen();
    } else if (document.msExitFullscreen) { /* IE/Edge */
      promise = document.msExitFullscreen();
    }
  }

</script>

</html>
